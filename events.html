<!DOCTYPE html>
<html lang="en">

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:#0C0C0C;color:#F0F0F0;font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#2C2C2C;border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:#E02020;}
input,textarea,select{font-family:'DM Sans',sans-serif;font-size:14px;color:#F0F0F0;}
button{font-family:'DM Sans',sans-serif;cursor:pointer;}

.pulse{animation:pulse 2s infinite;}
a{color:inherit;}
select option{background:#1C1C1C;color:#F0F0F0;}

<body>
<div id="app"></div>
<script>
// ─── DESIGN TOKENS ───────────────────────────────────────────────
const T={
  bg:"#0C0C0C",surface:"#141414",panel:"#1C1C1C",border:"#2C2C2C",borderHi:"#3C3C3C",
  red:"#E02020",redDim:"#7A1010",redGlow:"rgba(224,32,32,0.12)",
  gold:"#D4A017",green:"#1DB954",blue:"#2B7FE0",orange:"#E07820",
  text:"#F0F0F0",sub:"#888888",muted:"#444444",white:"#FFFFFF"
};
const CAT_COLOR={Marketing:T.blue,Operations:T.orange,Revenue:T.green,Community:"#A855F7",Sponsorship:T.gold,Admin:T.sub,Logistics:T.blue};
const PHASE_META={
  "-12":{name:"IGNITION",color:"#E02020",desc:"Members-first launch window"},
  "-10":{name:"LAUNCH",color:"#E07820",desc:"Go public — build momentum"},
  "-8":{name:"MOMENTUM",color:"#D4A017",desc:"Standards series + spotlights"},
  "-6":{name:"BUILD",color:"#1DB954",desc:"Teams, merch, leaderboard hype"},
  "-4":{name:"URGENCY",color:"#2B7FE0",desc:"Price up — scarcity language"},
  "-3":{name:"PRESSURE",color:"#7C3AED",desc:"Referral push + heat preview"},
  "-2":{name:"LOCKDOWN",color:"#E02020",desc:"Final push — equipment build"},
  "-1":{name:"EVE",color:"#E02020",desc:"Confirm everything"},
  "0":{name:"RACE DAY",color:"#E02020",desc:"Execute the plan"},
  "post":{name:"CONVERT",color:"#1DB954",desc:"Turn athletes into members"}
};
const FORMAT_DEFS=[
  {id:"strong",label:"DEKA STRONG",color:"#E02020",desc:"10 zones · no running",completionMin:20},
  {id:"mile",label:"DEKA MILE",color:"#2B7FE0",desc:"10 zones · 1-mile run loop",completionMin:30},
  {id:"atlas",label:"DEKA ATLAS",color:"#D4A017",desc:"10 zones · heavy implements",completionMin:35}
];
const REG_TYPES=[
  {id:"solo",label:"Solo",feat:null},
  {id:"team2",label:"2-Person Team",feat:"team"},
  {id:"youth",label:"Youth (10–13)",feat:"youth"},
  {id:"vip",label:"VIP / Elite",feat:"vip"}
];
// ─── UTILS ───────────────────────────────────────────────────────
const daysDiff=d=>{if(!d)return null;const now=new Date();now.setHours(0,0,0,0);return Math.round((new Date(d)-now)/86400000);};
const fmtDate=d=>{if(!d)return"";return new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});};
const pct=(a,b)=>b===0?0:Math.round(a/b*100);
const clamp=(v,lo,hi)=>Math.min(Math.max(v,lo),hi);
const iid=()=>Math.random().toString(36).slice(2,8);

const calcCapacity=(lanes,eventWindowHrs,intervalMin=10)=>{
  const windowMins=eventWindowHrs*60;
  const heatsPerLane=Math.floor(windowMins/intervalMin);
  const totalHeats=lanes*heatsPerLane;
  const startsPerHour=Math.floor(60/intervalMin);
  return{heatsPerLane,totalHeats,startsPerHour,windowMins};
};
const mkDefaultCategories=()=>({
  strong:{enabled:true,lanes:2,eventWindowHrs:3,intervalMin:15,slots:{solo:{price:65,target:20},team2:{price:110,target:4},youth:{price:40,target:0},vip:{price:85,target:0}}},
  mile:{enabled:true,lanes:2,eventWindowHrs:3,intervalMin:20,slots:{solo:{price:70,target:16},team2:{price:120,target:4},youth:{price:45,target:0},vip:{price:90,target:0}}},
  atlas:{enabled:false,lanes:2,eventWindowHrs:3,intervalMin:15,slots:{solo:{price:75,target:16},team2:{price:130,target:0},youth:{price:0,target:0},vip:{price:95,target:0}}}
});
const mkBudget=()=>({
  merchCost:500,equipmentRent:0,staffPay:200,marketingSpend:150,venueExtra:0,foodCost:0,giveaways:100,miscExpenses:100,
  staffCount:5,staffPayType:"flat",staffRate:40,staffHours:8,
  merchRevPPA:28,sponsorTotal:2500,sponsorCount:5,sponsorAvg:500,foodRevShare:100,foodSpendPPA:18,rafflePPA:8,prepSignups:0,prepPrice:120
});
const mkConfig=()=>({
  gymName:"",ownerName:"",eventName:"",eventDate:"",eventStart:"09:00",eventEnd:"17:00",
  categories:mkDefaultCategories(),
  features:{sponsor:true,merch:true,food:true,raffle:true,vip:true,youth:true,team:true},
  budget:mkBudget(),prepWeeks:12,
  customTasks:{edits:{},deleted:[],added:{pre:[],weekly:[],daily:[]},order:{pre:[],weekly:[],daily:[]}},
  hub:{links:[],contacts:[],notes:[]},setupDone:false
});
const deriveTotals=(cfg)=>{
  const cats=cfg.categories||mkDefaultCategories();
  const feats=cfg.features||{};
  let totalAthletes=0,grossRevenue=0;
  const allEntries=[],byFormat=[];
  FORMAT_DEFS.forEach(fd=>{
    const cat=cats[fd.id];
    if(!cat?.enabled)return;
    const lanes=cat.lanes||2,eventWindowHrs=cat.eventWindowHrs||3,intervalMin=cat.intervalMin||10;
    const cap=calcCapacity(lanes,eventWindowHrs,intervalMin);
    let fmtEntries=0,fmtAthletes=0,fmtGross=0;
    REG_TYPES.forEach(rt=>{
      if(rt.feat&&feats[rt.feat]===false)return;
      const slot=cat.slots?.[rt.id]||{price:0,target:0};
      const entries=slot.target||0,teamSz=rt.id==="team2"?2:1;
      const athletes=entries*teamSz,rev=entries*(slot.price||0);
      totalAthletes+=athletes;grossRevenue+=rev;fmtEntries+=entries;fmtAthletes+=athletes;fmtGross+=rev;
      if(entries>0)allEntries.push({fid:fd.id,fLabel:fd.label,fColor:fd.color,type:rt.label,teamSz,entries,athletes,price:slot.price,rev});
    });
    const overCapacity=fmtEntries>cap.totalHeats;
    byFormat.push({id:fd.id,label:fd.label,color:fd.color,lanes,eventWindowHrs,intervalMin,athletes:fmtAthletes,entries:fmtEntries,gross:fmtGross,capacity:cap,overCapacity});
  });
  const hostRevTickets=Math.round(grossRevenue*0.6);
  const merch=feats.merch?Math.round(totalAthletes*28):0;
  const sponsor=feats.sponsor?2500:0;
  const food=feats.food?Math.round(totalAthletes*3):0;
  const raffle=feats.raffle?Math.round(totalAthletes*8):0;
  const prep=Math.round(totalAthletes*0.25*120);
  const total=hostRevTickets+merch+sponsor+food+raffle+prep;
  return{totalAthletes,grossRevenue,hostRevTickets,merch,sponsor,food,raffle,prep,total,allEntries,byFormat};
};
// ─── APP STATE ───────────────────────────────────────────────────
let cfg=mkConfig();
let activeTab="presetup";
let checks={};
let preChecks={};
let taskNotes={};
let scores={};
let archives=[];
// UI sub-state
let openWeekMap={};
let openTaskId=null;
let openPreTaskId=null;
let openDayMap={};
let checklistCat="All";
let preEditing=false;
let weeklyEditing=false;
let dailyEditing=false;
let taskEditorDraft={pre:null,weekly:null,daily:null};
let taskEditorShowHidden={pre:false,weekly:false,daily:false};
// RevCalc
let revInc=null;
let revExp=null;
// Social
let socialSched=null;
let socialDraftModal=null;
let socialEditCell=null;
let socialActivePillar=null;
let socialCopiedIdx=null;
// Scorecard
let scorecardSelW=null;
// Hub
let hubNewLink={label:"",url:"",desc:""};
let hubNewContact={label:"",name:"",company:"",role:"Sponsor",phone:"",email:"",notes:""};
let hubNewNote={title:"",body:"",color:"#E0202033"};
let hubExpandedC=null;
// Templates
let tmplTypeFilter="all";
let tmplSearch="";
let tmplCopied=null;
let tmplExpanded={};
// Playbook
let playbookOpen={overview:true};
let playbookOpenWeek={};
let playbookOpenDay={};
// Setup local state
let setupL=null;
let setupPaysStaff=true;

// ─── PERSISTENCE ─────────────────────────────────────────────────
function loadState(){
  try{
    const s=localStorage.getItem('deka_event_host');
    if(s){const d=JSON.parse(s);if(d.cfg)cfg=d.cfg;if(d.checks)checks=d.checks;if(d.preChecks)preChecks=d.preChecks;if(d.notes)taskNotes=d.notes;if(d.scores)scores=d.scores;}
    const a=localStorage.getItem('dekaArchives');
    if(a)archives=JSON.parse(a);
  }catch(e){}
  const params=new URLSearchParams(window.location.search);
  const gym=params.get('gym');
  if(gym&&!cfg.gymName)cfg.gymName=gym;
  const owner=params.get('owner');
  if(owner&&!cfg.ownerName)cfg.ownerName=owner;
}
function saveState(){
  try{localStorage.setItem('deka_event_host',JSON.stringify({cfg,checks,preChecks,notes:taskNotes,scores}));}catch(e){}
}

// ─── TASK BUILDERS ───────────────────────────────────────────────
function buildPreTasks(){
  return[
    {id:"pre05",cat:"Operations",title:"Equipment compliance audit — all 10 zones",detail:"Cross-reference every piece of equipment against the current DEKA standards list. Zone 6 (D-Ball): max 1.5 lbs under standard. Zones 1 & 10 (RAM Lunges/Burpees): exact weight. Flag any gaps now — sourcing takes weeks. Do this per format if running multiple (STRONG vs MILE equipment lists differ)."},
    {id:"pre06",cat:"Operations",title:"Map your event floor layout",detail:"Sketch the zone-by-zone layout for each lane. STRONG: minimum 1,800 sq ft for 2 lanes. MILE: requires an 80m run loop in addition to the zone floor space. Confirm lane spacing, transition paths, and judge sightlines. This locks your equipment order quantities."},
    {id:"pre07",cat:"Operations",title:"Confirm athlete check-in and flow areas",detail:"Designate: check-in table, bib/wristband pickup, warm-up zone, spectator area, results/leaderboard display point, and athlete bag storage. Walk the path an athlete takes from arrival to start line."},
    {id:"pre08",cat:"Operations",title:"AED and first aid check",detail:"Confirm your AED is accessible, charged, and within expiry. Designate a trained responder for the event. Know the nearest urgent care and ER. Have a first aid kit stocked and at the floor."},
    {id:"pre10",cat:"Operations",title:"Identify and brief your head judge",detail:"Your head judge is responsible for standards consistency across all zones and resolving any no-rep disputes. This person needs to know every zone standard cold before race day. Brief them now, not the week before."},
    {id:"pre11",cat:"Admin",title:"Set up your event communication channels",detail:"Create a group for registered athletes (Facebook group, email list, or SMS broadcast tool). You'll use this for heat assignments, day-of logistics, and last-minute updates. Have it ready before registrations open."}
  ];
}

    t("w10b",-10,"Marketing","Standards & Tips Reel #1 — Zone 1 RAM Lunge","60-sec Reel. Show: what a perfect rep looks like, what a no-rep looks like, and the exact depth standard."),
    t("w10c",-10,"Community","Personal phone calls to 5–10 local gym owners","Call — do not DM. Personal call only. Offer: bring 10 athletes, head coach races free + gym logo on Community Partner banner.","Script: 'Hey [Name], it's [You]. I'm hosting an official DEKA World Championship qualifier on [Date]. I want your athletes there. Bring 10 people and your head coach competes free — I'll put your gym on our banner. Can I send you the link?'"),

    t("w8b",-8,"Marketing","Post current registration count","Post the exact number — never round. '47 athletes registered. [X] spots left in AM heats.' Specificity creates urgency that round numbers don't."),
    t("w8c",-8,"Sponsorship","Collect sponsor deposits — 50% non-refundable","Do not hold booths without deposits. Send invoice with 5-day payment deadline. No exceptions.",null,["sponsor"]),

    t("w6b",-6,"Community","Host free DEKA simulation class — open to public","Run all 10 zones at reduced intensity. Have tablet with registration open at the door. This is your highest-converting lead-gen activity."),

    t("w6e",-6,"Sponsorship","Confirm sponsor booth assignments + deliverable doc","Send each sponsor a one-page confirmation: booth size, setup time, what they provide, what you provide.",null,["sponsor"]),

    t("w4a",-4,"Marketing","Price increase #1 — announce and execute","Raise price by $10. Post: 'Prices go up at midnight. [X] spots left in AM heats.' No apology for the increase — scarcity is a feature.","'Heads up — early bird pricing ends at midnight tonight. After that, registration goes up $10. [X] spots left in AM heats. Don't say I didn't warn you: [LINK]'"),
    t("w4b",-4,"Marketing","Shift all messaging: Benefits → Scarcity","Stop explaining what DEKA is. Start telling people what they'll miss. Every post from ED-4 forward includes a specific scarcity signal."),
    t("w4c",-4,"Marketing","Standards & Tips Reel #4 — full course walkthrough","Walk the complete course on video. Every zone, every transition. Final fear-elimination piece. Pin this to your IG profile."),
    t("w4d",-4,"Community","Launch member referral competition","Track on a whiteboard or weekly IG Story post. Prize: free month or merch bundle."),
    t("w4e",-4,"Revenue","Open VIP / Elite Heat registrations","12–16 spots max. +$20 premium. Perks: priority check-in, dedicated judge, reserved parking, Elite Heat banner in photo.",null,["vip"]),

    t("w2d",-2,"Marketing","'Last warning' post","Post: 'Registration closes [date]. After that, walk-in only — no guaranteed heat time.'"),
    t("w2e",-2,"Revenue","Close pre-orders — finalize inventory","Lock exact counts by size. Confirm delivery ETA. Set up merch display layout on paper so setup on race day is fast.",null,["merch"]),
    t("w2f",-2,"Operations","MC script first draft complete","Script includes: intro, sponsor acknowledgments per heat, heat briefings, youth division feature moment, awards structure. Time it."),

  const byDay={
    "-14":[t("d14a",-14,"Marketing","Email blast — logistics + waiver reminder","Subject: 'Your DEKA [Event] checklist — read before race day.' Heat time, parking, waiver link, what to bring."),t("d14b",-14,"Marketing","Begin daily countdown posts","Each post: one specific thing to get excited about — the Tank push, a specific athlete rivalry, the leaderboard. Not just 'X days left.'"),t("d14c",-14,"Operations","Confirm food vendor ETA + get a race-day cell number","One last confirmation call. Confirm arrival time, setup spot, and get a number you can text on race morning.",null,["food"]),t("d14d",-14,"Operations","Order all remaining race-day supplies","Zip ties, duct tape, cones, backup wristbands, extra bibs, pens, printed heat sheets.")],

    "1":[t("dp1",1,"Marketing","Post results + finisher photos within 24 hours","Leaderboard screenshot + candid finisher photos. Tag every athlete you can identify."),t("dp2",1,"Operations","Internal debrief email to staff and volunteers","What worked. What didn't. Three improvements for next event. Do this while it's fresh.")]
  };
  return Object.entries(byDay).map(([day,tasks])=>({day:Number(day),tasks:tasks.filter(x=>x.show)})).sort((a,b)=>a.day-b.day);
}
function applyCustomTasks(baseTasks,customTasks,listKey){
  if(!customTasks)return baseTasks;
  const{edits={},deleted=[],added={},order={}}=customTasks;
  const merged=[...baseTasks,...(added[listKey]||[]).filter(t=>!baseTasks.find(b=>b.id===t.id))]
    .filter(t=>!deleted.includes(t.id))
    .map(t=>edits[t.id]?{...t,...edits[t.id]}:t);
  const savedOrder=order[listKey];
  if(!savedOrder||!savedOrder.length)return merged;
  return[...merged].sort((a,b)=>{const ai=savedOrder.indexOf(a.id),bi=savedOrder.indexOf(b.id);if(ai<0&&bi<0)return 0;if(ai<0)return 1;if(bi<0)return-1;return ai-bi;});
}

// ─── EXPORT/IMPORT ───────────────────────────────────────────────
function exportJSON(){
  const blob=new Blob([JSON.stringify({cfg,checks,preChecks,notes:taskNotes,scores},null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`deka-${cfg.gymName||"event"}-${new Date().toISOString().slice(0,10)}.json`;a.click();
}
function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.cfg)cfg=d.cfg;if(d.checks)checks=d.checks;if(d.preChecks)preChecks=d.preChecks;if(d.notes)taskNotes=d.notes;if(d.scores)scores=d.scores;
      render();
    }catch(err){}
  };
  r.readAsText(file);
}
function exportPDF(){
  const doc=new window.jspdf.jsPDF({unit:'pt',format:'letter'});
  const weekLabel=w=>w===99?"Post-Event":w<0?`ED ${w}`:"Event Day";
  doc.setFontSize(18);doc.text(cfg.eventName||"DEKA Event",40,40);
  doc.setFontSize(12);doc.text(`Gym: ${cfg.gymName}`,40,60);doc.text(`Date: ${cfg.eventDate}`,40,74);
  let y=100;
  buildTasks(cfg).forEach(t=>{
    if(y>700){doc.addPage();y=40;}
    doc.setFontSize(10);doc.text(`${weekLabel(t.week)} - ${t.cat}: ${t.title}`,40,y);y+=14;
    if(t.detail){const lines=doc.splitTextToSize(t.detail,500);doc.setFontSize(8);doc.text(lines,40,y);y+=lines.length*10+6;}
  });
  doc.save(`deka-${cfg.eventName||"event"}-${new Date().toISOString().slice(0,10)}.pdf`);
}

// ─── ARCHIVE ─────────────────────────────────────────────────────
function saveArchive(name){
  const snap={id:iid(),name,date:new Date().toLocaleDateString(),cfg:JSON.parse(JSON.stringify(cfg)),checks:{...checks},preChecks:{...preChecks},notes:{...taskNotes},scores:{...scores}};
  archives=[...archives,snap];
  localStorage.setItem('dekaArchives',JSON.stringify(archives));
}
function loadArchive(id){
  const a=archives.find(x=>x.id===id);if(!a)return;
  cfg=JSON.parse(JSON.stringify(a.cfg));
  checks={...(a.checks||{})};preChecks={...(a.preChecks||{})};taskNotes={...(a.notes||{})};scores={...(a.scores||{})};
  activeTab='dashboard';render();
}
function deleteArchive(id){
  archives=archives.filter(a=>a.id!==id);
  localStorage.setItem('dekaArchives',JSON.stringify(archives));
  render();
}

// ─── MAIN RENDER ─────────────────────────────────────────────────
function render(){
  saveState();
  const app=document.getElementById('app');
  if(!cfg.setupDone){
    app.innerHTML=renderSetup();
    bindSetup();
  } else {
    const tasks=buildTasks(cfg);
    const dailyDays=buildDailyTasks(cfg);
    const totals=deriveTotals(cfg);
    const allIds=[...tasks.map(t=>t.id),...dailyDays.flatMap(d=>d.tasks.map(t=>t.id))];
    const doneCount=allIds.filter(id=>checks[id]).length;
    const totalCount=allIds.length;
    const overallPct=pct(doneCount,totalCount);
    const dLeft=daysDiff(cfg.eventDate);
    const PRE_TASKS=buildPreTasks();
    const preApplied=applyCustomTasks(PRE_TASKS,cfg.customTasks,"pre");
    const presetupDone=preApplied.every(t=>preChecks[t.id]);
    app.innerHTML=renderShell(cfg,dLeft,overallPct,doneCount,totalCount,presetupDone,tasks,dailyDays,totals);
    bindApp(tasks,dailyDays,totals,dLeft,overallPct,doneCount,totalCount,presetupDone);
  }
}

function bindSetup(){
  // Basic text/date/number fields
  document.querySelectorAll('[data-setup]').forEach(el=>{
    el.addEventListener('input',e=>{
      const k=e.target.dataset.setup;
      setupL[k]=e.target.type==='number'?Number(e.target.value):e.target.value;
      if(k==='eventDate'&&setupL.eventDate){const w=clamp(Math.ceil(daysDiff(setupL.eventDate)/7),4,12);setupL.prepWeeks=w;}
      render();
    });
  });
  // Budget fields
  document.querySelectorAll('[data-setup-budget]').forEach(el=>{
    el.addEventListener('input',e=>{
      const k=e.target.dataset.setupBudget;
      setupL.budget[k]=Number(e.target.value);
      render();
    });
  });
  // Feature toggles
  document.querySelectorAll('[data-setup-feat]').forEach(el=>{
    el.addEventListener('click',e=>{
      const[k,v]=e.target.dataset.setupFeat.split('|');
      setupL.features[k]=(v==='true');
      render();
    });
  });
  // Format toggle
  document.querySelectorAll('[data-setup-toggle-format]').forEach(el=>{
    el.addEventListener('click',e=>{
      const fid=e.currentTarget.dataset.setupToggleFormat;
      setupL.categories[fid].enabled=!setupL.categories[fid].enabled;
      render();
    });
  });
  // Format category fields (lanes/window/interval)
  document.querySelectorAll('[data-setup-catfield]').forEach(el=>{
    el.addEventListener('click',e=>{
      const[fid,field,val]=e.currentTarget.dataset.setupCatfield.split('|');
      setupL.categories[fid][field]=Math.max(1,Number(val));
      render();
    });
  });
  // Slot inputs (price/target)
  document.querySelectorAll('[data-setup-slot]').forEach(el=>{
    el.addEventListener('input',e=>{
      const[fid,rid,field]=e.target.dataset.setupSlot.split('|');
      if(!setupL.categories[fid].slots[rid])setupL.categories[fid].slots[rid]={price:0,target:0};
      setupL.categories[fid].slots[rid][field]=Math.max(0,Number(e.target.value));
      render();
    });
  });
  // Staff pay type
  document.querySelectorAll('[data-setup-stafftype]').forEach(el=>{
    el.addEventListener('click',e=>{
      setupL.budget.staffPayType=e.currentTarget.dataset.setupStafftype;
      render();
    });
  });
  // Staff yes/no
  const sy=document.getElementById('staff-yes');const sn=document.getElementById('staff-no');
  if(sy)sy.addEventListener('click',()=>{setupPaysStaff=true;if(!(setupL.budget.staffCount>0))setupL.budget.staffCount=5;render();});
  if(sn)sn.addEventListener('click',()=>{setupPaysStaff=false;render();});
  // Submit
  const sub=document.getElementById('setup-submit');
  if(sub)sub.addEventListener('click',()=>{
    if(!(setupL.gymName&&setupL.eventDate&&setupL.eventName))return;
    const b=setupL.budget||mkBudget();
    const isHourly=b.staffPayType==="hourly";
    const staffTotal=setupPaysStaff?(isHourly?(b.staffCount||5)*(b.staffRate||40)*(b.staffHours||8):(b.staffCount||5)*(b.staffRate||40)):0;
    cfg={...setupL,budget:{...b,staffPay:staffTotal,sponsorTotal:(setupL.features?.sponsor!==false?(b.sponsorCount||5)*(b.sponsorAvg||500):0),foodRevShare:100},setupDone:true};
    setupL=null;
    activeTab='dashboard';
    render();
  });
}

// ─── DASHBOARD ───────────────────────────────────────────────────
function renderDashboard(tasks,dailyDays,dLeft,overallPct,doneCount,totalCount,totals,presetupDone){
  const upcomingWeekly=tasks.filter(t=>{
    if(t.week===99)return false;
    const wd=Math.abs(t.week)*7;
    return dLeft!==null&&dLeft<=wd+3&&dLeft>wd-10&&!checks[t.id];
  }).slice(0,4);
  const urgentDaily=dailyDays.flatMap(d=>d.tasks).filter(t=>{
    if(!cfg.eventDate)return false;
    const diff=Math.round((new Date(cfg.eventDate).getTime()+t.day*86400000-new Date().setHours(0,0,0,0))/86400000);
    return diff>=0&&diff<=3&&!checks[t.id];
  }).slice(0,3);
  const allUrgent=[...urgentDaily,...upcomingWeekly].slice(0,5);
  const barColor=overallPct>70?T.green:overallPct>40?T.orange:T.red;
  const dLeftColor=dLeft!==null&&dLeft<=14?T.red:T.text;

  const formatBreakdown=totals.byFormat.map(f=>{
    const pctFill=Math.min(100,Math.round(f.entries/Math.max(f.capacity.totalHeats,1)*100));
    const capColor=f.overCapacity?T.red:f.entries/f.capacity.totalHeats>=0.8?T.orange:T.green;
    const entryRows=totals.allEntries.filter(e=>e.fid===f.id).map(e=>`<div style="display:flex;gap:10px;padding:4px 0;font-size:11px;color:${T.sub};border-bottom:1px solid ${T.border}20"><span style="color:${e.fColor};min-width:90px;font-weight:600">${e.fLabel}</span><span style="flex:1">${e.type}</span><span style="font-family:'DM Mono';color:${T.muted}">${e.entries} × $${e.price}</span><span style="font-family:'DM Mono';color:${T.text};min-width:70px;text-align:right">$${e.rev.toLocaleString()}</span></div>`).join('');
    return`<div style="padding:10px 0;border-bottom:1px solid ${T.border}">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:6px">
        <div style="width:8px;height:8px;border-radius:50%;background:${f.color};flex-shrink:0"></div>
        <span style="font-family:'Bebas Neue';font-size:15px;color:${f.color};letter-spacing:0.5px;min-width:110px">${f.label}</span>

        <span style="font-family:'DM Mono';font-size:12px;color:${T.green}">$${Math.round(f.gross*0.6).toLocaleString()} yours</span>

// ─── CHECKLIST TAB ───────────────────────────────────────────────
function renderChecklist(baseTasks){
  const tasks=applyCustomTasks(baseTasks,cfg.customTasks,"weekly");
  const allCats=["All",...new Set(tasks.map(t=>t.cat))];
  const weeks=[...new Set(tasks.map(t=>t.week))].sort((a,b)=>a-b);
  const allWeeks=[...new Set(baseTasks.map(t=>t.week))].sort((a,b)=>a-b);
  const weekLabel=w=>w===99?"Post-Event":w<0?`ED ${w}`:"Event Day";
  const catBtns=allCats.map(c=>`<button data-cat-filter="${c}" style="padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid ${checklistCat===c?T.red:T.border};background:${checklistCat===c?"rgba(224,32,32,0.1)":"transparent"};color:${checklistCat===c?T.red:T.sub};transition:all 0.15s;cursor:pointer">${c}</button>`).join('');
  let weekBlocks='';
  weeks.forEach(w=>{
    const wt=tasks.filter(t=>t.week===w&&(checklistCat==="All"||t.cat===checklistCat)&&t.show!==false);
    if(!wt.length)return;
    const done=wt.filter(t=>checks[t.id]).length;
    const ph=PHASE_META[String(w)]||{name:"",color:T.sub};
    const open=openWeekMap[w];
    let taskItems=open?wt.map(t=>renderTaskItem(t,checks[t.id],taskNotes[t.id],openTaskId===t.id,"cl")).join(''):'';
    weekBlocks+=`<div style="background:${T.surface};border:1px solid ${open?T.borderHi:T.border};border-radius:10px;overflow:hidden;transition:border-color 0.15s">
      <button data-week-toggle="${w}" style="width:100%;background:transparent;border:none;padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer">
        <div style="width:8px;height:8px;border-radius:50%;background:${ph.color};flex-shrink:0"></div>
        <div style="flex:1;display:flex;align-items:center;gap:10px;text-align:left;flex-wrap:wrap">
          <span style="font-family:'Bebas Neue';font-size:17px;color:${T.text};letter-spacing:1px">${weekLabel(w)}</span>
          ${ph.name?`<span style="font-size:10px;color:${ph.color};font-weight:600;letter-spacing:1.5px">${ph.name}</span>`:""}
          ${ph.desc?`<span style="font-size:11px;color:${T.sub}">${ph.desc}</span>`:""}
        </div>
        <span style="font-size:11px;color:${done===wt.length?T.green:T.sub};font-family:'DM Mono';flex-shrink:0">${done}/${wt.length}</span>
        ${progBar(pct(done,wt.length),56,ph.color)}
        <span style="color:${T.muted};font-size:12px">${open?"▲":"▼"}</span>
      </button>
      ${open?`<div style="border-top:1px solid ${T.border}">${taskItems}</div>`:""}
    </div>`;
  });
  const taskEditorHtml=weeklyEditing?renderTaskEditor(baseTasks,"weekly",["Marketing","Operations","Revenue","Sponsorship","Community","Logistics"],allWeeks):"";
  return`<div class="fade-in">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <div style="display:flex;gap:6px;flex-wrap:wrap;flex:1">${catBtns}</div>
      <button id="weekly-edit-btn" style="padding:6px 14px;border-radius:6px;border:1px solid ${weeklyEditing?T.gold:T.border};background:${weeklyEditing?"rgba(212,160,23,0.1)":"transparent"};color:${weeklyEditing?T.gold:T.sub};font-size:12px;font-weight:500;cursor:pointer">${weeklyEditing?"✓ Done Editing":"✏ Edit Tasks"}</button>
    </div>
    ${taskEditorHtml}
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:${weeklyEditing?16:0}px">${weekBlocks}</div>
  </div>`;
}

// ─── DAILY MANAGER TAB ───────────────────────────────────────────
function renderDailyMgr(baseDailyDays){
  const baseTasks=baseDailyDays.flatMap(d=>d.tasks);
  const appliedTasks=applyCustomTasks(baseTasks,cfg.customTasks,"daily");
  const dailyDays=baseDailyDays.map(d=>({...d,tasks:appliedTasks.filter(t=>{const base=baseTasks.find(b=>b.id===t.id);return base?base.day===d.day:t.day===d.day;})}));
  const dayLabel=d=>d===0?"RACE DAY":d===1?"Day After":d<0?`ED ${d}`:`ED +${d}`;
  const daysFromNow=d=>{
    if(!cfg.eventDate)return null;
    const em=new Date(cfg.eventDate).getTime();
    const td=new Date(em+d*86400000);
    const now=new Date();now.setHours(0,0,0,0);
    return Math.round((td-now)/86400000);
  };
  const taskEditorHtml=dailyEditing?renderTaskEditor(baseTasks,"daily",["Marketing","Operations","Logistics","Race Day","Community"],[]):"";
  let dayBlocks='';
  dailyDays.filter(d=>d.tasks.length>0).forEach(({day,tasks})=>{
    const dfn=daysFromNow(day);
    const isToday=dfn===0,isRace=day===0,isPast=dfn!==null&&dfn<0;
    const done=tasks.filter(t=>checks[t.id]).length;
    const open=openDayMap[day];
    const borderCol=isRace?T.red:isToday?T.orange:open?T.borderHi:T.border;
    let taskItems=open?tasks.map(t=>renderTaskItem(t,checks[t.id],taskNotes[t.id],openTaskId===t.id,"daily")).join(''):'';
    dayBlocks+=`<div style="background:${isRace?"rgba(224,32,32,0.05)":T.surface};border:1px solid ${borderCol};border-radius:10px;overflow:hidden">
      <button data-day-toggle="${day}" style="width:100%;background:transparent;border:none;padding:13px 18px;display:flex;align-items:center;gap:12px;cursor:pointer">
        <div style="display:flex;gap:6px;align-items:center;flex:1">
          ${isToday?badge("TODAY",T.orange):""}${isRace?badge("RACE DAY",T.red):""}
          <span style="font-family:'Bebas Neue';font-size:16px;color:${isPast&&!isRace?T.sub:T.text};letter-spacing:1px">${dayLabel(day)}</span>
        </div>
        ${dfn!==null?`<span style="font-size:10px;color:${T.muted};font-family:'DM Mono'">${dfn>0?`in ${dfn}d`:dfn===0?"today":`${Math.abs(dfn)}d ago`}</span>`:""}
        <span style="font-size:11px;color:${done===tasks.length?T.green:T.sub};font-family:'DM Mono'">${done}/${tasks.length}</span>
        ${progBar(pct(done,tasks.length),48,isRace?T.red:T.blue)}
        <span style="color:${T.muted};font-size:11px">${open?"▲":"▼"}</span>
      </button>
      ${open?`<div style="border-top:1px solid ${T.border}">${taskItems}</div>`:""}
    </div>`;
  });
  return`<div class="fade-in">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <p style="font-size:13px;color:${T.sub};margin:0;flex:1;line-height:1.6">Your final 14-day daily execution checklist. Each day collapses into its tasks.</p>
      <button id="daily-edit-btn" style="padding:6px 14px;border-radius:6px;border:1px solid ${dailyEditing?T.gold:T.border};background:${dailyEditing?"rgba(212,160,23,0.1)":"transparent"};color:${dailyEditing?T.gold:T.sub};font-size:12px;font-weight:500;cursor:pointer;flex-shrink:0">${dailyEditing?"✓ Done Editing":"✏ Edit Tasks"}</button>
    </div>
    ${taskEditorHtml}
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:${dailyEditing?16:0}px">${dayBlocks}</div>
  </div>`;
}

// ─── TASK EDITOR ─────────────────────────────────────────────────
function renderTaskEditor(baseTasks,listKey,catOptions,weekOptions){
  const custom=cfg.customTasks||{edits:{},deleted:[],added:{pre:[],weekly:[],daily:[]},order:{}};
  const baseWithAdded=[...baseTasks,...(custom.added[listKey]||[]).filter(t=>!baseTasks.find(b=>b.id===t.id))];
  const savedOrder=custom.order[listKey];
  const orderedTasks=savedOrder&&savedOrder.length?[...baseWithAdded].sort((a,b)=>{const ai=savedOrder.indexOf(a.id),bi=savedOrder.indexOf(b.id);if(ai<0&&bi<0)return 0;if(ai<0)return 1;if(bi<0)return-1;return ai-bi;}):baseWithAdded;
  const showHidden=taskEditorShowHidden[listKey];
  const draft=taskEditorDraft[listKey];
  const visibleTasks=orderedTasks.filter(t=>!(custom.deleted||[]).includes(t.id));
  const hiddenTasks=orderedTasks.filter(t=>(custom.deleted||[]).includes(t.id));
  const displayList=showHidden?hiddenTasks:visibleTasks;

  const isDeleted=id=>(custom.deleted||[]).includes(id);
  const isEdited=id=>!!(custom.edits?.[id]);
  const isAdded=id=>(custom.added[listKey]||[]).some(t=>t.id===id);

  let addForm='';
  if(draft&&draft.mode==="add"){
    const catOpts=(catOptions||[]).map(c=>`<option value="${c}" ${draft.task.cat===c?"selected":""}>${c}</option>`).join('');
    const wkOpts=weekOptions&&weekOptions.length?`<div><label style="${LS()}">Week</label><select data-te-field-add="${listKey}|week" style="${IS()}"><option value="">— select week —</option>${weekOptions.map(w=>`<option value="${w}" ${draft.task.week===w?"selected":""}>${w===99?"Post-Event":w<0?`${Math.abs(w)} weeks before event`:"Event Day"}</option>`).join('')}</select></div>`:"";
    addForm=`<div style="padding:12px 18px 0">
      <div style="background:${T.panel};border:1px solid ${T.green};border-radius:8px;padding:16px;display:flex;flex-direction:column;gap:10px">
        <div style="font-size:10px;color:${T.green};letter-spacing:1.5px;font-weight:700">➕ NEW TASK</div>
        ${catOptions?`<div><label style="${LS()}">Category</label><select data-te-field-add="${listKey}|cat" style="${IS()}">${catOpts}</select></div>`:""}
        ${wkOpts}
        <div><label style="${LS()}">Task Title</label><input data-te-field-add="${listKey}|title" type="text" value="${escH(draft.task.title||"")}" placeholder="Brief, action-oriented task title..." style="${IS()}"></div>
        <div><label style="${LS()}">Detail / Instructions</label><textarea data-te-field-add="${listKey}|detail" rows="4" placeholder="What needs to be done, how to do it, and why it matters..." style="${IS('resize:vertical;line-height:1.6;font-size:13px')}">${escH(draft.task.detail||"")}</textarea></div>
        <div style="display:flex;gap:8px">
          <button data-te-add-save="${listKey}" style="flex:1;padding:9px;border-radius:6px;border:none;background:${draft.task.title?.trim()?T.green:T.muted};color:${draft.task.title?.trim()?"#000":"#fff"};font-family:'Bebas Neue';font-size:16px;letter-spacing:1px;cursor:pointer">SAVE</button>

  let rows=displayList.map((task,idx,arr)=>{

    const isEditing=draft&&draft.mode==="edit"&&draft.task?.id===task.id;

      <div style="display:flex;align-items:center;gap:8px;padding:11px 18px">
        ${!showHidden?`<div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0">
          <button data-te-move="${listKey}|${task.id}|-1" ${idx===0?"disabled":""} style="width:22px;height:18px;border-radius:3px;border:1px solid ${T.border};background:transparent;color:${idx===0?T.muted:T.sub};font-size:11px;line-height:1;cursor:${idx===0?"default":"pointer"};padding:0">↑</button>
          <button data-te-move="${listKey}|${task.id}|1" ${idx===arr.length-1?"disabled":""} style="width:22px;height:18px;border-radius:3px;border:1px solid ${T.border};background:transparent;color:${idx===arr.length-1?T.muted:T.sub};font-size:11px;line-height:1;cursor:${idx===arr.length-1?"default":"pointer"};padding:0">↓</button>
        </div>`:""}
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap">
            ${added?`<span style="font-size:9px;padding:1px 6px;border-radius:10px;background:rgba(29,185,84,0.15);color:${T.green};font-weight:700;letter-spacing:0.5px;flex-shrink:0">CUSTOM</span>`:""}
            ${edited&&!added?`<span style="font-size:9px;padding:1px 6px;border-radius:10px;background:rgba(212,160,23,0.15);color:${T.gold};font-weight:700;letter-spacing:0.5px;flex-shrink:0">EDITED</span>`:""}
            <span style="font-size:10px;color:${T.muted};flex-shrink:0">${display.cat||""}${display.week!=null?` · Wk ${display.week}`:""}</span>
          </div>
          <div style="font-size:13px;color:${T.text};font-weight:500;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escH(display.title||"")}</div>
          ${!isEditing&&display.detail?`<div style="font-size:11px;color:${T.muted};margin-top:2px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escH(display.detail)}</div>`:""}
        </div>
        <div style="display:flex;gap:5px;flex-shrink:0">
          ${!showHidden?`<button data-te-toggle-edit="${listKey}|${task.id}" style="padding:4px 10px;border-radius:5px;border:1px solid ${isEditing?T.gold:T.border};background:${isEditing?"rgba(212,160,23,0.1)":"transparent"};color:${isEditing?T.gold:T.sub};font-size:11px;cursor:pointer">${isEditing?"Cancel":"Edit"}</button>`:""}
          ${showHidden

  return`<div style="background:${T.surface};border:1px solid ${T.borderHi};border-radius:10px;overflow:hidden;margin-top:16px">
    <div style="display:flex;align-items:center;gap:10px;padding:13px 18px;border-bottom:1px solid ${T.border};background:${T.panel};flex-wrap:wrap">

function renderRevCalc(totals){

      rafflePPA:cfg.budget?.rafflePPA??8,prepSignups:cfg.budget?.prepSignups??Math.round(totals.totalAthletes*0.25),
      prepPrice:cfg.budget?.prepPrice??120
    };
  }
  if(!revExp){
    revExp={
      merchCost:cfg.budget?.merchCost??500,equipmentRent:cfg.budget?.equipmentRent??0,
      staffPay:cfg.budget?.staffPay??200,marketingSpend:cfg.budget?.marketingSpend??150,
      venueExtra:cfg.budget?.venueExtra??0,foodCost:cfg.budget?.foodCost??0,
      giveaways:cfg.budget?.giveaways??100,miscExpenses:cfg.budget?.miscExpenses??100
    };
  }
  const feats=cfg.features||{};
  const athletes=totals.totalAthletes;
  const incTickets=totals.hostRevTickets;
  const incMerch=feats.merch?Math.round(athletes*revInc.merchRevPPA):0;
  const incSponsor=feats.sponsor?revInc.sponsorTotal:0;
  const incFood=feats.food?Math.round(athletes*revInc.foodSpendPPA*revInc.foodRevShare/100):0;
  const incRaffle=feats.raffle?Math.round(athletes*revInc.rafflePPA):0;
  const incPrep=Math.round(revInc.prepSignups*revInc.prepPrice);
  const totalIncome=incTickets+incMerch+incSponsor+incFood+incRaffle+incPrep;
  const totalExpenses=Object.values(revExp).reduce((s,v)=>s+v,0);
  const netProfit=totalIncome-totalExpenses;
  const netColor=netProfit>0?T.green:netProfit<0?T.red:T.sub;

  function slideInc(label,k,min,max,step,unit,note){
    return`<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <span style="font-size:12px;color:${T.text};font-weight:500">${label}</span>
        <span style="font-size:13px;color:${T.green};font-family:'DM Mono';font-weight:600">${unit||""}${revInc[k].toLocaleString()}</span>
      </div>
      ${note?`<div style="font-size:10px;color:${T.muted};margin-bottom:4px">${note}</div>`:""}
      <input type="range" data-rev-inc="${k}" min="${min}" max="${max}" step="${step||1}" value="${revInc[k]}" style="width:100%;accent-color:${T.green}">
    </div>`;
  }
  function slideExp(label,k,min,max,step,unit,note){
    return`<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <span style="font-size:12px;color:${T.text};font-weight:500">${label}</span>
        <span style="font-size:13px;color:${T.orange};font-family:'DM Mono';font-weight:600">${unit||""}${revExp[k].toLocaleString()}</span>
      </div>
      ${note?`<div style="font-size:10px;color:${T.muted};margin-bottom:4px">${note}</div>`:""}
      <input type="range" data-rev-exp="${k}" min="${min}" max="${max}" step="${step||1}" value="${revExp[k]}" style="width:100%;accent-color:${T.orange}">
    </div>`;
  }
  function incRow(label,val,sub){return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid ${T.border}"><div><div style="font-size:12px;color:${T.sub}">${label}</div>${sub?`<div style="font-size:10px;color:${T.muted}">${sub}</div>`:""}</div><span style="font-family:'Bebas Neue';font-size:20px;color:${val>0?T.green:T.muted};letter-spacing:1px">$${val.toLocaleString()}</span></div>`;}
  function expRow(label,val){return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid ${T.border}"><div style="font-size:12px;color:${T.sub}">${label}</div><span style="font-family:'Bebas Neue';font-size:20px;color:${val>0?T.orange:T.muted};letter-spacing:1px">-$${val.toLocaleString()}</span></div>`;}

  return`<div style="display:flex;flex-direction:column;gap:20px" class="fade-in">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
      ${[{label:"Total Athletes",val:athletes,color:T.blue},{label:"Total Income (projected)",val:"$"+totalIncome.toLocaleString(),color:T.green},{label:"Total Expenses (budget)",val:"$"+totalExpenses.toLocaleString(),color:T.orange},{label:"Estimated Net Profit",val:(netProfit>=0?"":"-")+"$"+Math.abs(netProfit).toLocaleString(),color:netColor}].map(m=>`<div style="background:${T.surface};border:1px solid ${m.color}30;border-radius:9px;padding:14px 16px;text-align:center"><div style="font-family:'Bebas Neue';font-size:26px;color:${m.color};letter-spacing:1px;line-height:1">${m.val}</div><div style="font-size:10px;color:${T.sub};margin-top:4px;letter-spacing:0.5px">${m.label}</div></div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div style="display:flex;flex-direction:column;gap:16px">
        <div style="background:${T.surface};border:1px solid ${T.border};border-radius:10px;padding:18px 20px">
          <div style="font-family:'Bebas Neue';font-size:13px;letter-spacing:2px;color:${T.red};margin-bottom:14px">PROJECTED INCOME — WHAT COMES IN</div>
          <p style="font-size:11px;color:${T.muted};margin-bottom:14px;line-height:1.5">These sliders project how much income each stream could generate. <strong style="color:${T.sub}">These are projections, not guarantees.</strong></p>
          <div style="font-size:10px;color:${T.green};letter-spacing:1.5px;font-weight:700;margin-bottom:10px;border-bottom:1px solid ${T.border};padding-bottom:6px">TICKET REVENUE (auto-calculated from your setup)</div>
          <div style="display:flex;justify-content:space-between;margin-bottom:14px;padding:8px 12px;background:${T.panel};border-radius:7px"><span style="font-size:12px;color:${T.sub}">Your 60% of $${totals.grossRevenue.toLocaleString()} gross</span><span style="font-family:'Bebas Neue';font-size:20px;color:${T.green};letter-spacing:1px">$${incTickets.toLocaleString()}</span></div>
          ${feats.merch!==false?`<div style="font-size:10px;color:${T.green};letter-spacing:1.5px;font-weight:700;margin-bottom:8px">MERCHANDISE SALES</div>${slideInc("Projected revenue per athlete","merchRevPPA",0,100,1,"$",`${athletes} athletes × $${revInc.merchRevPPA} = $${incMerch.toLocaleString()} projected merch income`)}`:``}
          ${feats.sponsor!==false?`<div style="font-size:10px;color:${T.green};letter-spacing:1.5px;font-weight:700;margin-bottom:8px">SPONSORSHIPS</div>${slideInc("Total sponsorship income","sponsorTotal",0,10000,250,"$","100% yours. Goal: 1 Title ($1,500+), 2 Silver ($500), 2 Bronze ($250)")}`:``}
          ${feats.food!==false?`<div style="font-size:10px;color:${T.green};letter-spacing:1.5px;font-weight:700;margin-bottom:8px">FOOD VENDOR REVENUE SHARE</div>${slideInc("Avg athlete food spend","foodSpendPPA",0,40,1,"$",`Estimated total athlete food spend: $${Math.round(athletes*revInc.foodSpendPPA).toLocaleString()}`)}${slideInc("Your revenue share %","foodRevShare",0,30,1,"",`Your cut: ${revInc.foodRevShare}% of $${Math.round(athletes*revInc.foodSpendPPA).toLocaleString()} = $${incFood.toLocaleString()}`)}`:``}
          ${feats.raffle!==false?`<div style="font-size:10px;color:${T.green};letter-spacing:1.5px;font-weight:700;margin-bottom:8px">RAFFLE</div>${slideInc("Projected raffle revenue per athlete","rafflePPA",0,30,1,"$",`${athletes} athletes × $${revInc.rafflePPA} avg raffle spend = $${incRaffle.toLocaleString()}`)}`:``}

        </div>
        <div style="background:${T.surface};border:1px solid ${T.border};border-radius:10px;padding:18px 20px">
          <div style="font-family:'Bebas Neue';font-size:13px;letter-spacing:2px;color:${T.red};margin-bottom:14px">INCOME SUMMARY</div>

          <p style="font-size:11px;color:${T.muted};margin-bottom:14px;line-height:1.5">These are your estimated costs to run the event. Adjust each slider to see how spending decisions affect your bottom line.</p>

          ${slideExp("Equipment Rental / Gaps","equipmentRent",0,2000,50,"$","Any gear you need to rent or borrow to meet DEKA standards")}

          ${slideExp("Venue / Facility Extra","venueExtra",0,2000,50,"$","Any space cost beyond your own gym")}

          ${expRow("Equipment Rental / Gaps",revExp.equipmentRent)}
          ${expRow("Staff, Judges & Coaches",revExp.staffPay)}
          ${expRow("Marketing & Signage",revExp.marketingSpend)}
          ${expRow("Venue / Facility Extra",revExp.venueExtra)}
          ${expRow("Food / Refreshments",revExp.foodCost)}
          ${expRow("Awards & Giveaways",revExp.giveaways)}
          ${expRow("Misc Day-Of Expenses",revExp.miscExpenses)}
          <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0 0"><span style="font-family:'Bebas Neue';font-size:13px;letter-spacing:2px;color:${T.sub}">TOTAL ESTIMATED EXPENSES</span><span style="font-family:'Bebas Neue';font-size:36px;color:${T.orange};letter-spacing:1px">$${totalExpenses.toLocaleString()}</span></div>
        </div>
        <div style="background:${T.surface};border:2px solid ${netColor};border-radius:10px;padding:20px 24px;text-align:center">
          <div style="font-size:10px;color:${T.sub};letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Projected Net Profit</div>
          <div style="font-family:'Bebas Neue';font-size:56px;color:${netColor};letter-spacing:2px;line-height:1">${netProfit>=0?"":"-"}$${Math.abs(netProfit).toLocaleString()}</div>
          <div style="font-size:11px;color:${T.muted};margin-top:8px">$${totalIncome.toLocaleString()} income − $${totalExpenses.toLocaleString()} expenses</div>
          ${netProfit<0?`<div style="margin-top:12px;font-size:12px;color:${T.red};line-height:1.5">⚠ Current budget projects a loss. Increase athlete targets, sponsorships, or trim expenses.</div>`:""}
          ${netProfit>0&&netProfit<500?`<div style="margin-top:12px;font-size:12px;color:${T.orange};line-height:1.5">Thin margin. Consider increasing non-ticket revenue or reducing variable costs.</div>`:""}
        </div>
        <div style="background:rgba(224,32,32,0.07);border:1px solid rgba(224,32,32,0.18);border-radius:8px;padding:12px 14px"><div style="font-size:9px;color:${T.red};letter-spacing:1.5px;font-weight:700;margin-bottom:5px">NOTE ON TICKET SPLIT</div><p style="font-size:12px;color:${T.sub};line-height:1.6">DEKA takes 40% of gross ticket revenue. You keep 60% of tickets + 100% of all other income streams. Your highest-leverage moves are non-ticket income and keeping event expenses lean.</p></div>
      </div>
    </div>
  </div>`;

function renderScorecard(){
  const weeksOut=cfg.eventDate?clamp(Math.ceil(daysDiff(cfg.eventDate)/7),1,12):12;
  const weeks=[];for(let w=-weeksOut;w<=2;w++)weeks.push(w);
  if(scorecardSelW===null)scorecardSelW=weeks[0]||-12;
  const key=`w${scorecardSelW}`;
  const sc=scores[key]||{};
  const phaseTarget={"-12":"Founder's Rate live · Prep Program open · Sponsor list built","-10":"Public launch done · 5+ gym owners called · 15% of target registered","-8":"30%+ registered · Equipment confirmed · Volunteer list started","-6":"50%+ registered · Team push active · Merch pre-orders open","-4":"70%+ registered · Price increase #1 done · Referral competition live","-3":"80%+ registered · Heat schedule posted · Food vendor confirmed","-2":"90%+ registered · Price increase #2 done · Equipment built","-1":"All athletes confirmed · Volunteers briefed · MC script done","0":"Event Day — execute the plan","1":"Recap posted · Reviews requested","2":"Conversion offer sent · Next event early bird open"};
  const FIELDS=[{id:"regs",label:"New Registrations This Week",type:"num"},{id:"posts",label:"Social Posts Published",type:"num"},{id:"class",label:"Classes with DEKA Mentions",type:"num"},{id:"gym",label:"Gym Owner Calls Made",type:"num"},{id:"energy",label:"Team Energy Level (1-10)",type:"slider",min:1,max:10},{id:"win",label:"Biggest Win This Week",type:"text"},{id:"block",label:"Biggest Blocker",type:"text"},{id:"next",label:"#1 Priority Next Week",type:"text"}];
  let pts=0,tot=0;
  if(sc.regs){pts+=Math.min(sc.regs/4,3);tot+=3;}if(sc.posts){pts+=Math.min(sc.posts/5,2);tot+=2;}if(sc.class){pts+=Math.min(sc.class/7,2);tot+=2;}if(sc.gym){pts+=Math.min(sc.gym/2,2);tot+=2;}if(sc.energy){pts+=(sc.energy/10)*1;tot+=1;}
  const score=tot>0?Math.round(pts/tot*100):0;
  const scoreColor=score>=70?T.green:score>=40?T.orange:T.red;
  const scoreMsg=score>=70?"On pace. Keep pressure on.":score>=40?"Good momentum. Close the gaps.":"Attention needed — review blockers.";

  }).join('');
  const fieldRows=FIELDS.map(f=>`<div style="margin-bottom:16px">
    <label style="${LS()}">${f.label}</label>
    ${f.type==="num"?`<input data-sc-field="${f.id}" type="number" min="0" value="${sc[f.id]||""}" placeholder="0" style="${IS()}">`:""}
    ${f.type==="slider"?`<div style="display:flex;gap:12px;align-items:center"><input data-sc-slider="${f.id}" type="range" min="${f.min}" max="${f.max}" value="${sc[f.id]||5}" style="flex:1"><span style="font-family:'Bebas Neue';font-size:24px;color:${T.red};width:28px;text-align:right;letter-spacing:1px">${sc[f.id]||5}</span></div>`:""}
    ${f.type==="text"?`<textarea data-sc-text="${f.id}" rows="2" placeholder="Write here..." style="${IS('resize:vertical')}">${escH(sc[f.id]||"")}</textarea>`:""}
  </div>`).join('');
  const allWeeksPanel=weeks.map(w=>{
    const has=Object.keys(scores[`w${w}`]||{}).length>0;
    return`<button data-sc-week="${w}" style="background:transparent;border:none;display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid ${T.border}20;cursor:pointer;width:100%"><span style="font-size:12px;color:${scorecardSelW===w?T.red:T.sub};font-weight:${scorecardSelW===w?600:400}">${w===0?"Race Day":w>0?`ED +${w}`:`ED ${w}`}</span><span style="font-size:10px;color:${has?T.green:T.muted}">${has?"✓ filled":"—"}</span></button>`;
  }).join('');
  return`<div class="fade-in">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px">${weekBtns}</div>
    <div style="display:grid;grid-template-columns:1fr 260px;gap:20px;align-items:start">
      <div style="background:${T.surface};border:1px solid ${T.border};border-radius:10px;padding:18px 20px">
        <div style="font-family:'Bebas Neue';font-size:13px;letter-spacing:2px;color:${T.red};margin-bottom:14px">WEEK SCORECARD — ${scorecardSelW===0?"RACE DAY":scorecardSelW>0?`ED+${scorecardSelW}`:`ED${scorecardSelW}`}</div>
        ${phaseTarget[String(scorecardSelW)]?`<div style="background:rgba(224,32,32,0.07);border:1px solid rgba(224,32,32,0.18);border-radius:7px;padding:10px 13px;margin-bottom:16px"><div style="font-size:9px;color:${T.red};letter-spacing:1.5px;font-weight:700;margin-bottom:4px">THIS WEEK'S TARGETS</div><p style="font-size:12px;color:${T.sub};line-height:1.6">${phaseTarget[String(scorecardSelW)]}</p></div>`:""}
        ${fieldRows}
      </div>
      <div style="display:flex;flex-direction:column;gap:16px;position:sticky;top:90px">
        <div style="background:${T.surface};border:1px solid ${T.border};border-radius:10px;padding:18px 20px">
          <div style="font-family:'Bebas Neue';font-size:13px;letter-spacing:2px;color:${T.red};margin-bottom:14px">WEEK SCORE</div>
          <div style="text-align:center;padding:12px 0">
            <div style="font-family:'Bebas Neue';font-size:80px;color:${scoreColor};line-height:1;letter-spacing:2px">${score}</div>
            <div style="font-size:10px;color:${T.sub};letter-spacing:2px;margin-bottom:12px">OUT OF 100</div>
            <div style="height:4px;background:${T.border};border-radius:2px;overflow:hidden;margin-bottom:12px"><div style="height:100%;width:${score}%;background:${scoreColor};border-radius:2px"></div></div>
            <p style="font-size:12px;color:${T.sub};line-height:1.6">${scoreMsg}</p>
          </div>
        </div>
        <div style="background:${T.surface};border:1px solid ${T.border};border-radius:10px;padding:18px 20px">
          <div style="font-family:'Bebas Neue';font-size:13px;letter-spacing:2px;color:${T.red};margin-bottom:14px">ALL WEEKS</div>
          <div style="display:flex;flex-direction:column;gap:2px">${allWeeksPanel}</div>
        </div>
      </div>
    </div>
  </div>`;
}

      {icon:'🎫',t:'Spectator Tickets',d:'$10–20 general admission. Families of athletes are your primary audience. Free for children under 12.'},
      {icon:'🎰',t:'Raffle / Side Events',d:'50/50 raffle, silent auction, or side challenges (box jump contest, etc.) add $200–500 in additional revenue.'}
    ].map(r=>`<div style="display:flex;gap:14px;padding:12px 0;border-bottom:1px solid ${T.border}22">

          {r:'Low registration numbers',p:'Medium',m:'Early bird deadline urgency, partner gym incentive, email re-engagement sequence 3 weeks out.'},

}

function renderTemplates(){

  const gym=escH(cfg.gymName||'[GYM NAME]');

    {id:'email-launch',type:'email',title:'Launch Announcement',subject:`🚨 DEKA is coming to ${gym}!`,body:`Hey [First Name],\n\nBig news — we're hosting a DEKA event at ${gym} on ${date}!\n\nDEKA is the world's toughest fitness challenge — 10 zones, 10 movements, timed and scored. Whether you're a first-timer or a seasoned competitor, this is your chance to prove what you're made of.\n\n👉 Register now: [REGISTRATION LINK]\n\nEarly bird pricing ends [DATE] — don't miss out.\n\nLet's go,\n${gym} Team`},
    {id:'email-urgency',type:'email',title:'Urgency — Last Spots',subject:`⏰ Last chance — DEKA at ${gym} is almost full`,body:`Hey [First Name],\n\nJust a heads up — spots are filling fast for DEKA at ${gym} on ${date}.\n\nDon't get left out. Secure your spot now before we sell out:\n👉 [REGISTRATION LINK]\n\nQuestions? Reply to this email or DM us on Instagram.\n\n${gym} Team`},
    {id:'email-reminder',type:'email',title:'Week-Before Reminder',subject:`📅 DEKA is THIS WEEK — here's what you need to know`,body:`Hey [First Name],\n\nYour DEKA event at ${gym} is just days away! Here's everything you need:\n\n• 📍 Location: [VENUE ADDRESS]\n• 🕐 Your heat time: Check your registration confirmation\n• 🅿️ Parking: [PARKING INFO]\n• 👕 What to wear: Athletic clothing, no lifting shoes required\n• 💧 Hydration: Bring a water bottle\n\nAny questions? We're here.\n\nSee you on the floor,\n${gym} Team`},
    {id:'email-postevent',type:'email',title:'Post-Event Thank You',subject:`🏆 Thank you, DEKA athlete!`,body:`Hey [First Name],\n\nWOW. What an incredible day at ${gym}'s DEKA event!\n\nYou showed up, pushed hard, and left it all on the floor. We couldn't be prouder of every athlete who competed.\n\n📊 Your results: [RESULTS LINK]\n📸 Photos: [PHOTOS LINK]\n\nWe'd love your feedback — takes 2 minutes:\n👉 [SURVEY LINK]\n\nStay tuned — we'll be announcing our next event soon!\n\n${gym} Team`},
    {id:'sms-launch',type:'sms',title:'Launch SMS',body:`🚨 DEKA is coming to ${gym} on ${date}! 10 zones, 10 movements, all heart. Register: [LINK] — Early bird ends soon!`},
    {id:'sms-urgency',type:'sms',title:'Urgency SMS',body:`⏰ Last call! DEKA @ ${gym} is almost full. Grab your spot before it's gone → [LINK]`},
    {id:'sms-dayof',type:'sms',title:'Day-Of SMS',body:`🏁 TODAY IS THE DAY! DEKA @ ${gym} starts at [TIME]. Doors open [TIME-30min]. See you on the floor! 💪`},
    {id:'social-launch',type:'social',title:'Launch Post',body:`🚨 IT'S OFFICIAL — DEKA is coming to ${gym}!\n\n10 zones. 10 movements. One unforgettable challenge.\n\n📅 Date: ${date}\n📍 Location: ${gym}\n\nEarly bird registration is NOW OPEN — link in bio!\n\nTag a training partner who needs to do this with you 👇\n\n#DEKA #DEKAFit #${(cfg.gymName||'gym').replace(/\s+/g,'')} #FitnessChallenge #OCR`},
    {id:'social-countdown',type:'social',title:'Countdown Post',body:`⏳ [X] DAYS UNTIL DEKA @ ${gym}!\n\nAre you ready? Here's your checklist:\n✅ Registered\n✅ Training\n✅ Hyped\n\nSpots are going fast — don't sleep on this. Link in bio.\n\n#DEKAFit #Countdown #FitnessChallenge`},
    {id:'social-hype',type:'social',title:'Hype Reel Caption',body:`You've been training. Now it's time to PROVE IT. 🔥\n\nDEKA is coming to ${gym} on ${date} and we want YOU on the floor.\n\n10 zones. No excuses. Pure grit.\n\nRegister → link in bio\n\n#DEKA #DEKAFit #ProvingGrounds`},
    {id:'script-mc',type:'script',title:'MC Opening Script',body:`"GOOD MORNING ATHLETES AND WELCOME TO DEKA AT ${gym.toUpperCase()}!\n\nToday you will face 10 zones, 10 movements — and you will finish knowing exactly what you're made of.\n\nA few quick rules before we begin:\n• Complete ALL reps at each zone before moving on\n• Judges have final say — respect their call\n• If you fail to complete a zone, you will be assessed a time penalty\n\nThis is your moment. Your gym. Your community.\n\nLET'S GET IT STARTED — HEAT ONE, YOU'RE UP!"`},
    {id:'script-announcer',type:'script',title:'Heat Announcer Script',body:`"Athletes in Heat [NUMBER] — please make your way to the start line.\n\nYou have [TIME] to complete all 10 zones. The clock starts when the horn sounds.\n\nRemember: complete all reps at each zone. Your judge is your guide.\n\nOn your marks... 3... 2... 1... GO!"`}

  return`<div class="fade-in">

        ${types.map(tp=>`<button data-tmpl-type="${tp}" style="padding:6px 14px;border-radius:20px;border:1px solid ${selType===tp?T.red:T.border};background:${selType===tp?T.red:'transparent'};color:${selType===tp?'#fff':T.sub};font-size:12px;cursor:pointer">${tp.charAt(0).toUpperCase()+tp.slice(1)}</button>`).join('')}

    <div style="display:flex;flex-direction:column;gap:12px">
      ${filtered.length===0?`<p style="color:${T.sub}">No templates match your search.</p>`:filtered.map(t=>{
        const typeColors={email:'#3B82F6',sms:'#10B981',social:'#8B5CF6',script:'#F59E0B'};
        const tc=typeColors[t.type]||T.red;
        const isCopied=copied===t.id;
        const preview=t.body.replace(/\n/g,' ').slice(0,120)+'...';
        const isOpen=tmplOpen===t.id;
        const subjectRow=t.subject?`<div style="font-size:11px;color:${T.sub};margin-bottom:8px"><strong>Subject:</strong> ${escH(t.subject)}</div>`:'';
        return`<div style="background:${T.surface};border:1px solid ${T.border};border-radius:10px;overflow:hidden">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;gap:12px">

              <span style="padding:3px 10px;border-radius:20px;background:${tc}22;color:${tc};font-size:11px;font-weight:700;white-space:nowrap">${t.type.toUpperCase()}</span>
              <div>
                <div style="font-weight:700;color:${T.text};font-size:14px">${t.title}</div>
                <div style="color:${T.sub};font-size:11px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:400px">${preview}</div>
              </div>
            </div>
            <div style="display:flex;gap:6px;flex-shrink:0">
              <button data-tmpl-toggle="${t.id}" style="padding:6px 12px;border-radius:6px;border:1px solid ${T.border};background:transparent;color:${T.sub};font-size:12px;cursor:pointer">${isOpen?'▲ Hide':'▼ Show'}</button>
              <button data-tmpl-copy="${t.id}" data-tmpl-body="${escH(t.body)}" style="padding:6px 14px;border-radius:6px;border:none;background:${isCopied?'#10B981':T.red};color:#fff;font-size:12px;cursor:pointer;min-width:64px">${isCopied?'✓ Copied':'Copy'}</button>
            </div>
          </div>
          ${isOpen?`<div style="padding:14px 18px;border-top:1px solid ${T.border};background:${T.bg}">
            ${subjectRow}
            <pre style="margin:0;color:${T.text};font-size:12px;line-height:1.7;white-space:pre-wrap;font-family:'DM Mono',monospace">${escH(t.body)}</pre>
          </div>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ─── BIND APP ────────────────────────────────────────────────────
function bindApp(){
  // Tab navigation
  document.querySelectorAll('[data-tab]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      activeTab=btn.dataset.tab;
      render();
    });
  });

  // TopBar buttons
  const expBtn=document.getElementById('export-btn');
  if(expBtn) expBtn.addEventListener('click',exportJSON);
  const impBtn=document.getElementById('import-btn');
  if(impBtn) impBtn.addEventListener('click',importJSON);
  const pdfBtn=document.getElementById('pdf-btn');
  if(pdfBtn) pdfBtn.addEventListener('click',exportPDF);

  // Checklist category filter
  document.querySelectorAll('[data-cat]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      checklistCat=btn.dataset.cat;
      render();
    });
  });

  // Checklist week accordion
  document.querySelectorAll('[data-week-toggle]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const w=btn.dataset.weekToggle;
      openWeekMap[w]=!openWeekMap[w];
      render();
    });
  });

  // Checklist task checkbox
  document.querySelectorAll('[data-check-task]').forEach(el=>{
    el.addEventListener('change',e=>{
      const id=el.dataset.checkTask;
      checks[id]=e.target.checked;
      saveState();
      render();
    });
  });

  // Checklist task expand
  document.querySelectorAll('[data-expand-task]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.expandTask;
      openTaskId=openTaskId===id?null:id;
      render();
    });
  });

  // Checklist task note
  document.querySelectorAll('[data-note-task]').forEach(inp=>{
    inp.addEventListener('input',e=>{
      taskNotes[inp.dataset.noteTask]=e.target.value;
      saveState();
    });
  });

  // Daily Mgr day accordion
  document.querySelectorAll('[data-day-toggle]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const d=btn.dataset.dayToggle;
      openDayMap[d]=!openDayMap[d];
      render();
    });
  });

  // Daily task checkbox
  document.querySelectorAll('[data-daily-check]').forEach(el=>{
    el.addEventListener('change',e=>{
      const id=el.dataset.dailyCheck;
      checks[id]=e.target.checked;
      saveState();
      render();
    });
  });

  // Daily task expand
  document.querySelectorAll('[data-daily-expand]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.dailyExpand;
      openTaskId=openTaskId===id?null:id;
      render();
    });
  });

  // Daily task note
  document.querySelectorAll('[data-daily-note]').forEach(inp=>{
    inp.addEventListener('input',e=>{
      taskNotes[inp.dataset.dailyNote]=e.target.value;
      saveState();
    });
  });

  // Pre-event task checkbox
  document.querySelectorAll('[data-pre-check]').forEach(el=>{
    el.addEventListener('change',e=>{
      const id=el.dataset.preCheck;
      preChecks[id]=e.target.checked;
      saveState();
      render();
    });
  });

  // Pre-event task expand
  document.querySelectorAll('[data-pre-expand]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.preExpand;
      openTaskId=openTaskId===id?null:id;
      render();
    });
  });

  // Pre-event task note
  document.querySelectorAll('[data-pre-note]').forEach(inp=>{
    inp.addEventListener('input',e=>{
      taskNotes[inp.dataset.preNote]=e.target.value;
      saveState();
    });
  });

  // Task Editor tab switching
  document.querySelectorAll('[data-te-tab]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      teTab=btn.dataset.teTab;
      render();
    });
  });

  // Task Editor: add new task
  const teAddBtn=document.getElementById('te-add-btn');
  if(teAddBtn) teAddBtn.addEventListener('click',()=>{
    const titleEl=document.getElementById('te-new-title');
    const catEl=document.getElementById('te-new-cat');
    const weekEl=document.getElementById('te-new-week');
    const scriptEl=document.getElementById('te-new-script');
    if(!titleEl||!titleEl.value.trim()) return;
    const newTask={
      id:iid(),
      title:titleEl.value.trim(),
      cat:catEl?catEl.value:'general',
      week:weekEl?parseInt(weekEl.value)||1:1,
      script:scriptEl?scriptEl.value.trim():'',
      custom:true
    };
    cfg.customTasks=cfg.customTasks||[];
    cfg.customTasks.push(newTask);
    saveState();
    render();
  });

  // Task Editor: edit existing (inline)
  document.querySelectorAll('[data-te-edit]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      teEditId=btn.dataset.teEdit;
      render();
    });
  });

  // Task Editor: save inline edit
  document.querySelectorAll('[data-te-save]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.teSave;
      const titleEl=document.getElementById(`te-edit-title-${id}`);
      const scriptEl=document.getElementById(`te-edit-script-${id}`);
      if(titleEl){
        cfg.customEdits=cfg.customEdits||{};
        cfg.customEdits[id]={title:titleEl.value.trim(),script:scriptEl?scriptEl.value.trim():''};
        teEditId=null;
        saveState();
        render();
      }
    });
  });

  // Task Editor: cancel inline edit
  document.querySelectorAll('[data-te-cancel]').forEach(btn=>{
    btn.addEventListener('click',()=>{ teEditId=null; render(); });
  });

  // Task Editor: hide/restore task
  document.querySelectorAll('[data-te-hide]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.teHide;
      cfg.hiddenTasks=cfg.hiddenTasks||[];
      if(!cfg.hiddenTasks.includes(id)) cfg.hiddenTasks.push(id);
      saveState(); render();
    });
  });
  document.querySelectorAll('[data-te-restore]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.teRestore;
      cfg.hiddenTasks=(cfg.hiddenTasks||[]).filter(h=>h!==id);
      saveState(); render();
    });
  });

  // Task Editor: delete custom task
  document.querySelectorAll('[data-te-del]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.teDel;
      cfg.customTasks=(cfg.customTasks||[]).filter(t=>t.id!==id);
      saveState(); render();
    });
  });

  // Revenue sliders / inputs
  document.querySelectorAll('[data-rev-slider]').forEach(el=>{
    el.addEventListener('input',e=>{
      const key=el.dataset.revSlider;
      revInc[key]=parseFloat(e.target.value)||0;
      saveState(); render();
    });
  });
  document.querySelectorAll('[data-exp-slider]').forEach(el=>{
    el.addEventListener('input',e=>{
      const key=el.dataset.expSlider;
      revExp[key]=parseFloat(e.target.value)||0;
      saveState(); render();
    });
  });

  // Scorecard week selector
  document.querySelectorAll('[data-sc-week]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      scorecardSelW=parseInt(btn.dataset.scWeek);
      render();
    });
  });

  // Scorecard inputs
  document.querySelectorAll('[data-sc-field]').forEach(el=>{
    el.addEventListener('input',e=>{
      const key=el.dataset.scField;
      const w=scorecardSelW||1;
      scores[w]=scores[w]||{};
      scores[w][key]=el.type==='range'||el.type==='number'?parseFloat(e.target.value)||0:e.target.value;
      saveState(); render();
    });
  });

  // Archive: save current
  const archSaveBtn=document.getElementById('arch-save-btn');
  if(archSaveBtn) archSaveBtn.addEventListener('click',saveArchive);

  // Archive: load/delete/json
  document.querySelectorAll('[data-arch-load]').forEach(btn=>{
    btn.addEventListener('click',()=>loadArchive(btn.dataset.archLoad));
  });
  document.querySelectorAll('[data-arch-del]').forEach(btn=>{
    btn.addEventListener('click',()=>deleteArchive(btn.dataset.archDel));
  });
  document.querySelectorAll('[data-arch-json]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const a=archives.find(x=>x.id===btn.dataset.archJson);
      if(a){
        const blob=new Blob([JSON.stringify(a,null,2)],{type:'application/json'});
        const url=URL.createObjectURL(blob);
        const link=document.createElement('a');
        link.href=url; link.download=`${(a.name||'event').replace(/\s+/g,'_')}.json`;
        link.click(); URL.revokeObjectURL(url);
      }
    });
  });

  // Social grid cells
  document.querySelectorAll('[data-social-cell]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      socialEditCell=btn.dataset.socialCell;
      render();
    });
  });

  // Social modal
  const socialSave=document.getElementById('social-cell-save');
  if(socialSave) socialSave.addEventListener('click',()=>{
    const pillarEl=document.getElementById('social-pillar-sel');
    const platformEl=document.getElementById('social-platform-sel');
    const noteEl=document.getElementById('social-note-inp');
    socialSched=socialSched||{};
    socialSched[socialEditCell]={
      pillar:pillarEl?pillarEl.value:'',
      platform:platformEl?platformEl.value:'',
      note:noteEl?noteEl.value:''
    };
    socialEditCell=null;
    saveState(); render();
  });
  const socialClear=document.getElementById('social-cell-clear');
  if(socialClear) socialClear.addEventListener('click',()=>{
    if(socialSched&&socialEditCell) delete socialSched[socialEditCell];
    socialEditCell=null;
    saveState(); render();
  });
  const socialClose=document.getElementById('social-modal-close');
  if(socialClose) socialClose.addEventListener('click',()=>{ socialEditCell=null; render(); });
  const socialOverlay=document.getElementById('social-modal-overlay');
  if(socialOverlay) socialOverlay.addEventListener('click',e=>{ if(e.target===socialOverlay){ socialEditCell=null; render(); }});

  // Playbook section nav
  document.querySelectorAll('[data-pb-sec]').forEach(btn=>{
    btn.addEventListener('click',()=>{ playbookSection=btn.dataset.pbSec; render(); });
  });

  // Playbook PDF
  const pbPdf=document.getElementById('pb-pdf-btn');
  if(pbPdf) pbPdf.addEventListener('click',exportPDF);

  // Hub: links
  const hubLinkAdd=document.getElementById('hub-link-add');
  if(hubLinkAdd) hubLinkAdd.addEventListener('click',()=>{
    const labelEl=document.getElementById('hub-link-label');
    const urlEl=document.getElementById('hub-link-url');
    const url=(urlEl?urlEl.value.trim():'');
    if(!url) return;
    hubLinks=hubLinks||[];
    hubLinks.push({label:labelEl?labelEl.value.trim():'',url});
    hubNewLink={};
    saveState(); render();
  });
  document.querySelectorAll('[data-hub-del-link]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const i=parseInt(btn.dataset.hubDelLink);
      hubLinks.splice(i,1);
      saveState(); render();
    });
  });
  document.querySelectorAll('[data-hub-quick-link]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const q=JSON.parse(btn.dataset.hubQuickLink);
      hubLinks=hubLinks||[];
      if(!hubLinks.find(l=>l.url===q.url)) hubLinks.push(q);
      saveState(); render();
    });
  });

  // Hub: notes
  const hubNoteAdd=document.getElementById('hub-note-add');
  if(hubNoteAdd) hubNoteAdd.addEventListener('click',()=>{
    const textEl=document.getElementById('hub-note-text');
    const text=(textEl?textEl.value.trim():'');
    if(!text) return;
    hubNotes=hubNotes||[];
    hubNotes.push({text,color:hubNoteColor||T.red});
    hubNewNote='';
    saveState(); render();
  });
  document.querySelectorAll('[data-hub-del-note]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const i=parseInt(btn.dataset.hubDelNote);
      hubNotes.splice(i,1);
      saveState(); render();
    });
  });
  document.querySelectorAll('[data-hub-note-color]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      hubNoteColor=btn.dataset.hubNoteColor;
      render();
    });
  });

  // Hub: contacts
  const hubConAdd=document.getElementById('hub-con-add');
  if(hubConAdd) hubConAdd.addEventListener('click',()=>{
    const nameEl=document.getElementById('hub-con-name');
    const roleEl=document.getElementById('hub-con-role');
    const phoneEl=document.getElementById('hub-con-phone');
    const name=(nameEl?nameEl.value.trim():'');
    if(!name) return;
    hubContacts=hubContacts||[];
    hubContacts.push({name,role:roleEl?roleEl.value.trim():'',phone:phoneEl?phoneEl.value.trim():''});
    hubNewContact={};
    saveState(); render();
  });
  document.querySelectorAll('[data-hub-del-contact]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const i=parseInt(btn.dataset.hubDelContact);
      hubContacts.splice(i,1);
      saveState(); render();
    });
  });
  document.querySelectorAll('[data-hub-contact-toggle]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const i=parseInt(btn.dataset.hubContactToggle);
      hubContactOpen=hubContactOpen===i?null:i;
      render();
    });
  });

  // Templates: search
  const tmplSearchEl=document.getElementById('tmpl-search');
  if(tmplSearchEl) tmplSearchEl.addEventListener('input',e=>{ tmplSearch=e.target.value; render(); });

  // Templates: type filter
  document.querySelectorAll('[data-tmpl-type]').forEach(btn=>{
    btn.addEventListener('click',()=>{ tmplType=btn.dataset.tmplType; render(); });
  });

  // Templates: toggle expand
  document.querySelectorAll('[data-tmpl-toggle]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.tmplToggle;
      tmplOpen=tmplOpen===id?null:id;
      render();
    });
  });

  // Templates: copy
  document.querySelectorAll('[data-tmpl-copy]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const body=btn.dataset.tmplBody;
      navigator.clipboard.writeText(body).then(()=>{
        tmplCopied=btn.dataset.tmplCopy;
        render();
        setTimeout(()=>{ tmplCopied=''; render(); },2000);
      }).catch(()=>{
        // fallback
        const ta=document.createElement('textarea');
        ta.value=body; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        tmplCopied=btn.dataset.tmplCopy;
        render();
        setTimeout(()=>{ tmplCopied=''; render(); },2000);
      });
    });
  });
}

// ─── MISSING STATE VARIABLES (added after initial declarations) ───
// These supplement the declarations block above
let hubLinks=[];
let hubContacts=[];
let hubNotes=[];
let hubNoteColor='#EF4444';
let hubContactOpen=null;
let tmplType='';
let tmplOpen=null;
let teTab='weekly';
let teEditId=null;
let playbookSection='overview';

// Patch loadState to also restore hub/social/template state
(function patchLoadState(){
  const orig=loadState;
  loadState=function(){
    orig();
    try{
      const s=localStorage.getItem('deka_event_host');
      if(s){
        const d=JSON.parse(s);
        if(d.hubLinks) hubLinks=d.hubLinks;
        if(d.hubContacts) hubContacts=d.hubContacts;
        if(d.hubNotes) hubNotes=d.hubNotes;
        if(d.socialSched) socialSched=d.socialSched;
        if(d.revInc) revInc=d.revInc;
        if(d.revExp) revExp=d.revExp;
        if(d.scores) scores=d.scores;
        if(d.archives) archives=d.archives;
      }
    }catch(e){}
  };
})();

// Patch saveState to also persist hub/social/template state
(function patchSaveState(){
  const orig=saveState;
  saveState=function(){
    orig();
    try{
      const s=localStorage.getItem('deka_event_host');
      const d=s?JSON.parse(s):{};
      d.hubLinks=hubLinks;
      d.hubContacts=hubContacts;
      d.hubNotes=hubNotes;
      d.socialSched=socialSched;
      d.revInc=revInc;
      d.revExp=revExp;
      d.scores=scores;
      d.archives=archives;
      localStorage.setItem('deka_event_host',JSON.stringify(d));
    }catch(e){}
  };
})();

// ─── INIT ────────────────────────────────────────────────────────
loadState();
render();

</script>
</body>
</html>
