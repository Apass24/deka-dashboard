<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEKA | Admin Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<style>
:root { --bg:#0d0f14; --surface:#161b22; --surface2:#1c2333; --border:#21262d; --text:#e6edf3; --text-dim:#8b92a5; --accent:#e74c3c; --blue:#3498db; --green:#2ecc71; --yellow:#f39c12; }
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:24px}
h1{font-size:24px;font-weight:800;margin-bottom:4px} h1 span{color:var(--accent)}
.subtitle{font-size:12px;color:var(--text-dim);margin-bottom:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:12px}
.btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{opacity:0.9}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-green{border-color:var(--green);color:var(--green)}
.btn-red{border-color:var(--accent);color:var(--accent)}
input,select{width:100%;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none;box-sizing:border-box}
input:focus{border-color:var(--accent)}
label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
.user-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.user-row:last-child{border-bottom:none}
.user-name{font-weight:600;min-width:160px}
.user-email{color:var(--text-dim);font-size:12px;min-width:200px}
.user-region{font-size:12px;min-width:100px}
.user-status{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;min-width:60px;text-align:center}
.status-active{background:rgba(46,204,113,0.15);color:var(--green)}
.status-inactive{background:rgba(231,76,60,0.15);color:var(--accent)}
.user-actions{margin-left:auto;display:flex;gap:6px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 20px;font-size:13px;color:var(--text);opacity:0;transition:opacity 0.3s;z-index:9999}
.nav{display:flex;gap:8px;margin-bottom:20px}
.nav a{color:var(--text-dim);text-decoration:none;font-size:12px;padding:6px 12px;border:1px solid var(--border);border-radius:6px;transition:all 0.15s}
.nav a:hover{border-color:var(--text-dim);color:var(--text)}
#invite-form{display:none}
</style>
</head>
<body>
<div class="container">
  <h1><span>DEKA</span> Admin Panel</h1>
  <p class="subtitle">Manage dashboard access for your team</p>

  <div class="nav">
    <a href="index.html">← Portfolio Dashboard</a>
    <a href="pipeline.html">← Sales Pipeline</a>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="card-title" style="margin-bottom:0">Team Members</div>
      <button class="btn btn-primary btn-sm" onclick="toggleInviteForm()">+ Invite Manager</button>
    </div>

    <div id="invite-form" class="card" style="background:var(--surface2);margin-bottom:16px">
      <div class="card-title">Invite New Manager</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <div><label>Email</label><input id="inv-email" type="email" placeholder="sarah@example.com"></div>
        <div><label>Full Name</label><input id="inv-name" placeholder="Sarah Johnson"></div>
        <div><label>Region</label><input id="inv-region" placeholder="Southeast"></div>
        <div><label>Region Filter Value</label><input id="inv-filter" placeholder="South East"></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" onclick="inviteUser()">Send Invite</button>
        <button class="btn btn-sm" onclick="toggleInviteForm()">Cancel</button>
      </div>
      <div id="invite-result" style="display:none;margin-top:10px;padding:10px;border-radius:6px;font-size:12px"></div>
    </div>

    <div id="user-list">
      <div style="color:var(--text-dim);font-size:12px;padding:20px 0;text-align:center">Loading...</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Quick Stats</div>
    <div id="admin-stats" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
      <div style="text-align:center"><div style="font-size:24px;font-weight:800;color:var(--accent);font-family:'Space Mono',monospace" id="stat-total">-</div><div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px">Total Users</div></div>
      <div style="text-align:center"><div style="font-size:24px;font-weight:800;color:var(--green);font-family:'Space Mono',monospace" id="stat-active">-</div><div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px">Active</div></div>
      <div style="text-align:center"><div style="font-size:24px;font-weight:800;color:var(--text-dim);font-family:'Space Mono',monospace" id="stat-regions">-</div><div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px">Regions</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
async function boot() {
  const authResult = await dekaAuthCheck();
  if (authResult !== true) return;

  // Check if admin
  if (_userProfile.role !== 'admin') {
    document.querySelector('.container').innerHTML = `
      <h1><span>DEKA</span> Admin Panel</h1>
      <div class="card" style="margin-top:20px;text-align:center;padding:40px">
        <div style="font-size:16px;color:var(--accent);margin-bottom:8px">Access Denied</div>
        <div style="font-size:13px;color:var(--text-dim)">This page is only available to administrators.</div>
        <a href="index.html" class="btn" style="margin-top:16px;display:inline-block;text-decoration:none">← Back to Dashboard</a>
      </div>`;
    return;
  }

  loadUsers();
}

async function loadUsers() {
  const users = await dekaAdminGetUsers();
  const list = document.getElementById('user-list');
  const activeCount = users.filter(u => u.active).length;
  const regions = [...new Set(users.map(u => u.region).filter(Boolean))];

  document.getElementById('stat-total').textContent = users.length;
  document.getElementById('stat-active').textContent = activeCount;
  document.getElementById('stat-regions').textContent = regions.length;

  if (users.length === 0) {
    list.innerHTML = '<div style="color:var(--text-dim);font-size:12px;padding:20px 0;text-align:center">No users yet. Click "Invite Manager" to get started.</div>';
    return;
  }

  list.innerHTML = users.map(u => `
    <div class="user-row">
      <div class="user-name">${esc(u.full_name || 'No name')}</div>
      <div class="user-email">${esc(u.email)}</div>
      <div class="user-region">${esc(u.region || '—')}</div>
      <div class="user-status ${u.active ? 'status-active' : 'status-inactive'}">${u.active ? 'Active' : 'Inactive'}</div>
      <div class="user-actions">
        <button class="btn btn-sm ${u.active ? 'btn-red' : 'btn-green'}" onclick="toggleUser('${u.id}',${!u.active})">${u.active ? 'Deactivate' : 'Activate'}</button>
      </div>
    </div>`).join('');
}

function toggleInviteForm() {
  const f = document.getElementById('invite-form');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
  document.getElementById('invite-result').style.display = 'none';
}

async function inviteUser() {
  const email = document.getElementById('inv-email').value.trim();
  const name = document.getElementById('inv-name').value.trim();
  const region = document.getElementById('inv-region').value.trim();
  const filter = document.getElementById('inv-filter').value.trim();
  const result = document.getElementById('invite-result');

  if (!email || !name || !region) {
    result.style.display = 'block';
    result.style.background = 'rgba(231,76,60,0.1)';
    result.style.color = 'var(--accent)';
    result.textContent = 'Please fill in email, name, and region.';
    return;
  }

  const res = await dekaAdminInviteUser(email, name, region, filter);
  result.style.display = 'block';

  if (res.success) {
    result.style.background = 'rgba(46,204,113,0.1)';
    result.style.color = 'var(--green)';
    result.innerHTML = `User created! Their temporary password is: <strong style="user-select:all;cursor:pointer">${res.tempPassword}</strong><br><span style="font-size:11px;color:var(--text-dim)">Send this to ${name} along with the dashboard URL. They can change it after logging in.</span>`;
    document.getElementById('inv-email').value = '';
    document.getElementById('inv-name').value = '';
    document.getElementById('inv-region').value = '';
    document.getElementById('inv-filter').value = '';
    loadUsers();
  } else {
    result.style.background = 'rgba(231,76,60,0.1)';
    result.style.color = 'var(--accent)';
    result.textContent = res.message || 'Failed to create user.';
  }
}

async function toggleUser(id, active) {
  const success = await dekaAdminToggleUser(id, active);
  if (success) {
    showToast(active ? 'User activated' : 'User deactivated');
    loadUsers();
  }
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 3000);
}

boot();
</script>
</body>
</html>
